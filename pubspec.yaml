name: biblio
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  syncfusion_flutter_pdf: ^32.2.7
  syncfusion_flutter_pdfviewer: ^32.2.7
  file_picker: ^10.3.6
  flutter_riverpod: ^3.0.3
  
  path_provider: ^2.1.5
  sembast: ^3.8.5+1
  path: ^1.9.1
  http: ^1.6.0
  supabase_flutter: ^2.12.0
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^10.0.0
  supabase: ^2.10.2
  # EPUB support only
  epubx: ^4.0.0
  flutter_inappwebview: ^6.0.0
  flutter_epub_viewer:
    path: packages/flutter_epub_viewer
  google_fonts: ^8.0.0
  shared_preferences: ^2.5.4
  google_generative_ai: ^0.4.7
  intl: ^0.20.2

  image_gallery_saver_plus: ^4.0.1
  share_plus: ^12.0.1
  confetti: ^0.7.0
  flutter_confetti: ^0.5.1
  flutter_screenutil: ^5.9.3
  flutter_native_splash: ^2.2.16
  camera: ^0.12.0
  google_mlkit_text_recognition: ^0.15.1
  image_cropper: ^11.0.0
  url_launcher: ^6.3.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F3EF"
  adaptive_icon_foreground: "assets/icon/logo.png"

flutter_native_splash:
  color: "#F5F3EF"
  image: "assets/icon/logo.png"
  color_dark: "#F5F3EF"
  image_dark: "assets/icon/logo.png"
  android_12:
    image: "assets/icon/logo.png"
    icon_background_color: "#F5F3EF"
    image_dark: "assets/icon/logo.png"
    icon_background_color_dark: "#F5F3EF"
  fullscreen: false


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/images/reading_background.png
    - assets/images/reading_background2.png
    - assets/images/quote_background.png
    - assets/ob/


  fonts:
    - family: Bookerly
      fonts:
        - asset: assets/fonts/Bookerly Light.ttf
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather_24pt-Light.ttf
    - family: Baskerville
      fonts:
        - asset: assets/fonts/Baskervville-Regular.ttf
    - family: Palatino
      fonts:
        - asset: assets/fonts/palr45w.ttf
    - family: Literata
      fonts:
        - asset: assets/fonts/Literata-Light.ttf
    - family: Larken
      fonts:
        - asset: assets/fonts/LarkenDEMO-Regular.otf
    - family: NeueMontreal
      fonts:
        - asset: assets/fonts/NeueMontreal-Medium.otf
    - family: NeueMontrealLight
      fonts:
        - asset: assets/fonts/NeueMontreal-Light.otf
    - family: NeueMontrealRegular
      fonts:
        - asset: assets/fonts/NeueMontreal-Regular.otf
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway-Regular.ttf

    - family: StackSansNotch
      fonts:
        - asset: assets/fonts/StackSansNotch-VariableFont_wght.ttf


    - family: SF-UI-Display
      fonts:
        - asset: assets/fonts/sf-ui-display-thin-58646e9b26e8b.otf
          weight: 100
        - asset: assets/fonts/sf-ui-display-ultralight-58646b19bf205.otf
          weight: 200
        - asset: assets/fonts/sf-ui-display-light-58646b33e0551.otf
          weight: 300
        - asset: assets/fonts/sf-ui-display-medium-58646be638f96.otf
          weight: 500
        - asset: assets/fonts/sf-ui-display-semibold-58646eddcae92.otf
          weight: 600
        - asset: assets/fonts/sf-ui-display-bold-58646a511e3d9.otf
          weight: 700
        - asset: assets/fonts/sf-ui-display-heavy-586470160b9e5.otf
          weight: 800
        - asset: assets/fonts/sf-ui-display-black-58646a6b80d5a.otf
          weight: 900
